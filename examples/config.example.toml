[queue]
db = ".gen-image-queue/queue.sqlite3"
output_dir = "output/imagegen"
# 0 = auto. Auto uses enabled provider/key capacity so extra jobs stay queued.
concurrency = 0
poll_interval_seconds = 5
request_timeout_seconds = 180
max_attempts = 3

[defaults]
# Empty means automatic routing across all enabled providers.
# Set a provider id here only when every default request should be pinned.
provider = ""
size = "1024x1024"
quality = "auto"
output_format = "png"
moderation = "auto"
images_per_request = 1
# Optional default prompt template id from [[prompt_templates]].
prompt_template = ""

[[prompt_templates]]
id = "cinematic"
name = "Cinematic wrapper"
enabled = false
body = "Style: cinematic, high detail.\n\n{{prompt}}\n\nRequested size: {{size}} ({{ratio}})."

[send]
# Optional adapter used by `generate --send`, `once --send`, and `send`.
# Set preset = "hermes" for Hermes Agent's messaging tool, or
# preset = "openclaw" for OpenClaw's `message send --media` CLI route.
# For Python adapters, module.function receives one dict per output file/target.
# For command adapters, command argv items may use {path}, {target}, {message}, and {caption}.
method = "python-call"
preset = ""
module = ""
function = ""
targets = []
message_template = "MEDIA:{path}"
retry_delays = [2, 5, 10]
delay_seconds = 0

# OpenClaw preset example:
# preset = "openclaw"
# targets = ["@mychat"]
# message_template = "Generated {filename}\nMEDIA:{path}"
# [send.args]
# channel = "telegram"
# force_document = true

[[providers]]
id = "mock-local"
type = "mock"
enabled = true
priority = 1
capabilities = ["generate", "edit"]
images_per_request = 1
max_concurrent_requests = 1
codex_cli = false
response_format_b64_json = false
append_size_to_prompt = false
force_responses_stream = false
responses_stream_partial_images = 0

[[providers]]
id = "responses-router"
type = "responses-image"
base_url = "https://anyrouter.top/v1"
model = "gpt-5.3-codex"
enabled = false
priority = 5
capabilities = ["generate", "edit"]
images_per_request = 1
max_concurrent_requests = 1
codex_cli = true
append_size_to_prompt = false
force_responses_stream = true
responses_stream_partial_images = 1

[providers.headers]
User-Agent = "Mozilla/5.0"
Origin = "null"

[[providers.keys]]
id = "responses-key-a"
api_key_env = "RESPONSES_IMAGE_API_KEY"
images_per_request = 1
max_concurrent_requests = 1

[[providers]]
id = "openai-main"
type = "openai-images"
base_url = "https://api.openai.com/v1"
model = "gpt-image-2"
enabled = false
priority = 10
capabilities = ["generate", "edit"]
images_per_request = 1
max_concurrent_requests = 2
response_format_b64_json = true
append_size_to_prompt = false

[[providers.keys]]
id = "openai-key-a"
api_key_env = "OPENAI_API_KEY"
images_per_request = 1
max_concurrent_requests = 1

[[providers.keys]]
id = "openai-key-b"
api_key_env = "OPENAI_API_KEY_2"
images_per_request = 1
max_concurrent_requests = 1

[[providers]]
id = "idlecloud"
type = "idlecloud"
base_url = "https://api.idlecloud.cc/api"
model = "nai-diffusion-4-5-full"
enabled = false
priority = 15
capabilities = ["generate", "edit"]
images_per_request = 1
max_concurrent_requests = 1

[providers.params]
negativePrompt = ""
steps = 28
scale = 5
sampler = "k_euler"
noise_schedule = "karras"
ucPreset = 1

[[providers.keys]]
id = "idlecloud-key-a"
api_key_env = "IDLECLOUD_API_KEY"
images_per_request = 1
max_concurrent_requests = 1

[[providers]]
id = "nai-idlecloud"
type = "nai"
base_url = "https://api.idlecloud.cc/api"
model = "nai-diffusion-4-5-full"
enabled = false
priority = 16
capabilities = ["generate", "edit"]
images_per_request = 1
max_concurrent_requests = 1

[providers.params]
negative_prompt = ""
steps = 28
scale = 5
sampler = "k_euler"
noise_schedule = "karras"
ucPreset = 1

[[providers.keys]]
id = "nai-key-a"
api_key_env = "IDLECLOUD_API_KEY"
images_per_request = 1
max_concurrent_requests = 1


[[providers]]
id = "custom-async-example"
type = "custom-http"
enabled = false
priority = 20
base_url = "https://api.example.com/v1"
model = "example-image-model"
capabilities = ["generate", "edit"]

[[providers.keys]]
id = "custom-key-a"
api_key_env = "CUSTOM_IMAGE_API_KEY"
images_per_request = 1
max_concurrent_requests = 1

[providers.submit]
path = "images/generations"
method = "POST"
content_type = "json"
task_id_path = "data.task_id"

[providers.submit.body]
model = "$model"
prompt = "$prompt"
size = "$params.size"
n = "$n"

[providers.poll]
path = "tasks/{task_id}"
method = "GET"
interval_seconds = 5
status_path = "data.status"
success_values = ["completed"]
failure_values = ["failed", "cancelled"]
error_path = "data.error.message"

[providers.poll.result]
image_url_paths = ["data.images.*.url"]
b64_json_paths = ["data.images.*.b64_json"]


